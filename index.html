<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olympus Brawler HD</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #334b9b, #0c1020 70%);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: 1280px;
      max-width: 97vw;
      text-align: center;
    }
    h1 {
      margin: 10px 0 6px;
      letter-spacing: 1px;
    }
    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .panel {
      flex: 1;
      min-width: 220px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 10px 12px;
      color: #f1e7c4;
      font-size: 14px;
    }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 4px solid #efd48d;
      box-shadow: 0 22px 50px rgba(0,0,0,0.45);
      background: #101726;
    }
    .help {
      margin-top: 10px;
      color: #ddd;
      line-height: 1.45;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Olympus Brawler HD</h1>
    <div class="topbar">
      <div class="panel"><strong>Move</strong> A/D • <strong>Jump</strong> W • <strong>Dash</strong> L</div>
      <div class="panel"><strong>Attack</strong> F quick • G heavy • H special • J ultimate</div>
      <div class="panel"><strong>Defense</strong> K shield • <strong>Pause</strong> P</div>
    </div>
    <canvas id="game" width="1280" height="720"></canvas>
    <div class="help">
      This version is built for <strong>real sprite graphics</strong>. Add your PNGs in the asset folders and the game will use them automatically.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const keys = {};
    const pressed = {};

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (!keys[k]) pressed[k] = true;
      keys[k] = true;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const STATES = {
      TITLE: "title",
      FIGHTER_SELECT: "fighterSelect",
      STAGE_SELECT: "stageSelect",
      PLAYING: "playing",
      PAUSED: "paused",
      GAME_OVER: "gameOver"
    };

    let state = STATES.TITLE;
    let frame = 0;
    let shake = 0;
    let selectedFighter = 0;
    let selectedStage = 0;
    let winner = null;

    const gravity = 0.75;
    const friction = 0.82;

    const fighters = [
      { name:"Zeus", color:"#f7edb7", accent:"#fff15b", speed:.78, jump:15.4, light:10, heavy:18, special:14, ult:34, kb:1.12, projectile:"bolt" },
      { name:"Ares", color:"#d45b49", accent:"#8e1f1a", speed:.68, jump:14.5, light:12, heavy:21, special:14, ult:38, kb:1.24, projectile:"fire" },
      { name:"Athena", color:"#d7deef", accent:"#6d86c6", speed:.80, jump:15.3, light:10, heavy:16, special:12, ult:33, kb:1.04, projectile:"spear" },
      { name:"Poseidon", color:"#74d4de", accent:"#0c8397", speed:.69, jump:14.8, light:11, heavy:18, special:15, ult:36, kb:1.21, projectile:"wave" },
      { name:"Artemis", color:"#abd88f", accent:"#2d7e49", speed:.94, jump:16.1, light:8, heavy:14, special:11, ult:30, kb:.98, projectile:"arrow" },
      { name:"Hades", color:"#665b72", accent:"#b45cff", speed:.61, jump:14.2, light:12, heavy:22, special:15, ult:40, kb:1.22, projectile:"shadow" },
      { name:"Heracles", color:"#ca9350", accent:"#ffcf66", speed:.58, jump:14.0, light:13, heavy:25, special:16, ult:44, kb:1.36, projectile:"rock" },
      { name:"Achilles", color:"#efc472", accent:"#e44149", speed:.99, jump:15.9, light:9, heavy:15, special:12, ult:31, kb:1.02, projectile:"dash" },
      { name:"Odysseus", color:"#bba081", accent:"#4c6e6c", speed:.84, jump:15.5, light:9, heavy:15, special:12, ult:32, kb:1.00, projectile:"trick" }
    ];

    const stages = [
      { name:"Mount Olympus", background:"assets/backgrounds/olympus.png", sky1:"#87ceff", sky2:"#ecf9ff", ground1:"#80b75e", ground2:"#527d40", platform:"#e4c27a", accent:"#f0d48a" },
      { name:"The Underworld", background:"assets/backgrounds/underworld.png", sky1:"#362343", sky2:"#17101f", ground1:"#5b4467", ground2:"#261c30", platform:"#9063af", accent:"#c866ff" },
      { name:"Poseidon's Temple", background:"assets/backgrounds/poseidon_temple.png", sky1:"#66d7ef", sky2:"#dffcff", ground1:"#4f97a6", ground2:"#205d68", platform:"#82dbeb", accent:"#d5ffff" }
    ];

    function fighterFolder(name) {
      return name.toLowerCase().replace(/[^a-z]/g, "");
    }

    function loadImage(src) {
      const img = new Image();
      img.src = src;
      img.dataset.failed = "false";
      img.onerror = () => { img.dataset.failed = "true"; };
      return img;
    }

    function makeAnimFrames(folder, anim, count) {
      const arr = [];
      for (let i = 1; i <= count; i++) {
        arr.push(loadImage(`assets/fighters/${folder}/${anim}_${i}.png`));
      }
      return arr;
    }

    const assetBank = {
      backgrounds: {},
      fighters: {}
    };

    stages.forEach(stage => {
      assetBank.backgrounds[stage.name] = loadImage(stage.background);
    });

    fighters.forEach(f => {
      const folder = fighterFolder(f.name);
      assetBank.fighters[f.name] = {
        idle: makeAnimFrames(folder, "idle", 2),
        run: makeAnimFrames(folder, "run", 4),
        jump: makeAnimFrames(folder, "jump", 1),
        quick: makeAnimFrames(folder, "quick", 2),
        heavy: makeAnimFrames(folder, "heavy", 2),
        special: makeAnimFrames(folder, "special", 2),
        ult: makeAnimFrames(folder, "ult", 2),
        hurt: makeAnimFrames(folder, "hurt", 1)
      };
    });

    const particles = [];
    const projectiles = [];

    const arena = { x: 220, y: 500, w: 840, h: 28 };
    const arenaPlatforms = [
      { x: 280, y: 370, w: 180, h: 18 },
      { x: 820, y: 370, w: 180, h: 18 },
      { x: 550, y: 270, w: 180, h: 16 }
    ];

    let human = null;
    let cpu = null;

    function currentStage() {
      return stages[selectedStage];
    }

    function getFighterByName(name) {
      return fighters.find(f => f.name === name);
    }

    function createPlayer(fighter, x, isCPU) {
      return {
        ...fighter,
        x, y: 260,
        w: 70, h: 100,
        vx: 0, vy: 0,
        facing: x < canvas.width / 2 ? 1 : -1,
        damage: 0,
        lives: 3,
        grounded: false,
        jumpsLeft: 2,
        shield: 100,
        shielding: false,
        invuln: 50,
        stun: 0,
        attack: "idle",
        attackTimer: 0,
        attackHit: false,
        cooldowns: { light: 0, heavy: 0, special: 0, ult: 0, dash: 0 },
        ultMeter: 0,
        isCPU,
        animTimer: 0,
        animFrame: 0
      };
    }

    function startMatch() {
      const playerFighter = fighters[selectedFighter];
      const cpuChoices = fighters.filter((_, i) => i !== selectedFighter);
      const cpuFighter = cpuChoices[Math.floor(Math.random() * cpuChoices.length)];

      human = createPlayer(playerFighter, 330, false);
      cpu = createPlayer(cpuFighter, 880, true);

      particles.length = 0;
      projectiles.length = 0;
      winner = null;
      state = STATES.PLAYING;
    }

    function addParticles(x, y, color, count = 10, size = 4) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.8) * 8,
          life: 26 + Math.random() * 14,
          color,
          size: size * (0.7 + Math.random())
        });
      }
    }

    function meleeBox(p) {
      const range = p.attack === "heavy" ? 95 : p.attack === "ult" ? 125 : 60;
      return {
        x: p.facing === 1 ? p.x + p.w - 6 : p.x - range + 6,
        y: p.y + 18,
        w: range,
        h: 50
      };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    function spawnProjectile(p, isUltimate = false) {
      const size =
        p.projectile === "rock" ? 18 :
        p.projectile === "wave" ? 16 :
        p.projectile === "shadow" ? 16 :
        p.projectile === "arrow" ? 8 : 12;

      const speed =
        p.projectile === "arrow" ? 13 :
        p.projectile === "dash" ? 11 :
        p.projectile === "rock" ? 8 :
        p.projectile === "wave" ? 8.5 : 9.5;

      projectiles.push({
        owner: p,
        x: p.facing === 1 ? p.x + p.w + 10 : p.x - 10,
        y: p.y + 30,
        vx: p.facing * (isUltimate ? speed * 1.2 : speed),
        vy: 0,
        size: isUltimate ? size * 1.3 : size,
        life: isUltimate ? 90 : 70,
        color: p.accent,
        damage: isUltimate ? p.ult : p.special,
        kb: isUltimate ? p.kb * 1.35 : p.kb,
        type: p.projectile,
        ultimate: isUltimate
      });

      addParticles(p.x + p.w / 2, p.y + 20, p.accent, isUltimate ? 18 : 10, 3);
    }

    function startAttack(p, type) {
      if (p.stun > 0 || p.shielding) return;

      if (type === "light" && p.cooldowns.light <= 0) {
        p.attack = "quick";
        p.attackTimer = 10;
        p.cooldowns.light = 18;
        p.attackHit = false;
      }

      if (type === "heavy" && p.cooldowns.heavy <= 0) {
        p.attack = "heavy";
        p.attackTimer = 18;
        p.cooldowns.heavy = 34;
        p.attackHit = false;
      }

      if (type === "special" && p.cooldowns.special <= 0) {
        p.attack = "special";
        p.attackTimer = 18;
        p.cooldowns.special = 48;
        p.attackHit = false;
        spawnProjectile(p, false);
      }

      if (type === "ult" && p.cooldowns.ult <= 0 && p.ultMeter >= 100) {
        p.attack = "ult";
        p.attackTimer = 38;
        p.cooldowns.ult = 220;
        p.attackHit = false;
        p.ultMeter = 0;
        spawnProjectile(p, true);
        shake = 14;
        addParticles(p.x + p.w / 2, p.y + p.h / 2, p.accent, 36, 5);
      }
    }

    function dash(p) {
      if (p.cooldowns.dash <= 0) {
        p.vx = p.facing * 15;
        p.invuln = 10;
        p.cooldowns.dash = 40;
        addParticles(p.x + p.w / 2, p.y + p.h / 2, p.accent, 12, 2);
      }
    }

    function applyHit(attacker, defender, damage, kb, color, heavy = false) {
      if (defender.invuln > 0) return;

      if (defender.shielding && defender.shield > 0) {
        defender.shield -= damage * 3;
        addParticles(defender.x + defender.w / 2, defender.y + 30, "#9fd7ff", 16, 3);
        if (defender.shield <= 0) {
          defender.shield = 0;
          defender.stun = 70;
          shake = 10;
        }
        return;
      }

      defender.damage += damage;
      attacker.ultMeter = Math.min(100, attacker.ultMeter + damage * 0.9);
      defender.ultMeter = Math.min(100, defender.ultMeter + damage * 0.3);

      const power = (6 + defender.damage * 0.11) * kb;
      defender.vx += attacker.facing * power;
      defender.vy -= 5.4 + defender.damage * 0.025;
      defender.invuln = heavy ? 14 : 9;
      defender.stun = heavy ? 8 : 3;

      addParticles(defender.x + defender.w / 2, defender.y + 26, color, heavy ? 26 : 16, heavy ? 5 : 3);
      shake = Math.max(shake, heavy ? 12 : 7);
    }

    function handleMeleeHit(attacker, defender) {
      if (attacker.attackHit) return;
      if (!["quick", "heavy", "ult"].includes(attacker.attack)) return;

      if (rectsOverlap(meleeBox(attacker), defender)) {
        attacker.attackHit = true;

        if (attacker.attack === "quick") applyHit(attacker, defender, attacker.light, 0.96, attacker.accent, false);
        if (attacker.attack === "heavy") applyHit(attacker, defender, attacker.heavy, attacker.kb, attacker.accent, true);
        if (attacker.attack === "ult") applyHit(attacker, defender, attacker.ult, attacker.kb * 1.4, attacker.accent, true);
      }
    }

    function humanInput(p) {
      p.shielding = keys["k"] && p.shield > 0 && p.stun <= 0;

      if (p.shielding) {
        p.shield -= 0.45;
        p.vx *= 0.9;
      } else {
        p.shield = Math.min(100, p.shield + 0.2);
      }

      if (p.stun > 0) return;

      if (keys["a"]) {
        p.vx -= p.speed;
        p.facing = -1;
      }
      if (keys["d"]) {
        p.vx += p.speed;
        p.facing = 1;
      }
      if (pressed["w"] && p.jumpsLeft > 0) {
        p.vy = -p.jump;
        p.jumpsLeft--;
        p.grounded = false;
      }
      if (pressed["l"]) dash(p);

      if (keys["f"]) startAttack(p, "light");
      if (keys["g"]) startAttack(p, "heavy");
      if (keys["h"]) startAttack(p, "special");
      if (keys["j"]) startAttack(p, "ult");
    }

    function cpuInput(p, enemy) {
      p.shielding = false;
      const dx = enemy.x - p.x;
      const dy = enemy.y - p.y;
      const dist = Math.abs(dx);

      p.facing = dx >= 0 ? 1 : -1;

      if (p.stun > 0) return;

      if (p.x < arena.x + 60) p.vx += p.speed;
      else if (p.x + p.w > arena.x + arena.w - 60) p.vx -= p.speed;
      else if (dist > 85) p.vx += (dx > 0 ? 1 : -1) * p.speed * 0.85;
      else if (dist < 55) p.vx += (dx > 0 ? -1 : 1) * p.speed * 0.5;

      if (p.grounded && (dy < -70 || Math.random() < 0.01) && p.jumpsLeft > 0) {
        p.vy = -p.jump;
        p.jumpsLeft--;
      }

      if (dist < 80 && Math.abs(dy) < 70) {
        if (p.cooldowns.light <= 0 && Math.random() < 0.08) startAttack(p, "light");
        if (p.cooldowns.heavy <= 0 && Math.random() < 0.03) startAttack(p, "heavy");
      } else if (dist < 260 && p.cooldowns.special <= 0 && Math.random() < 0.025) {
        startAttack(p, "special");
      }

      if (p.ultMeter >= 100 && p.cooldowns.ult <= 0 && dist < 180 && Math.random() < 0.025) {
        startAttack(p, "ult");
      }

      if (enemy.attack !== "idle" && dist < 80 && p.shield > 20 && Math.random() < 0.08) {
        p.shielding = true;
      }

      if (p.cooldowns.dash <= 0 && dist < 70 && Math.random() < 0.01) dash(p);
    }

    function landOn(p, plat) {
      if (
        p.x + p.w > plat.x &&
        p.x < plat.x + plat.w &&
        p.y + p.h >= plat.y &&
        p.y + p.h <= plat.y + plat.h + 20 &&
        p.vy >= 0
      ) {
        p.y = plat.y - p.h;
        p.vy = 0;
        p.grounded = true;
        p.jumpsLeft = 2;
      }
    }

    function respawn(p) {
      p.lives--;
      p.damage = 0;
      p.x = p.isCPU ? 880 : 330;
      p.y = 250;
      p.vx = 0;
      p.vy = 0;
      p.invuln = 70;
      p.shield = 100;
      p.attack = "idle";
      p.stun = 0;
      addParticles(p.x + p.w / 2, p.y + p.h / 2, "#ffffff", 28, 4);

      if (p.lives <= 0) {
        winner = p.isCPU ? human.name : cpu.name;
        state = STATES.GAME_OVER;
      }
    }

    function updatePlayer(p, enemy) {
      if (p.isCPU) cpuInput(p, enemy);
      else humanInput(p);

      Object.keys(p.cooldowns).forEach(k => {
        if (p.cooldowns[k] > 0) p.cooldowns[k]--;
      });

      if (p.invuln > 0) p.invuln--;
      if (p.stun > 0) p.stun--;

      if (p.attack !== "idle") {
        p.attackTimer--;
        handleMeleeHit(p, enemy);
        if (p.attackTimer <= 0) p.attack = "idle";
      }

      p.vy += gravity;
      p.x += p.vx;
      p.y += p.vy;

      p.vx *= p.grounded ? friction : 0.94;
      p.grounded = false;

      landOn(p, arena);
      arenaPlatforms.forEach(pl => landOn(p, pl));

      if (p.y > canvas.height + 120 || p.x < -180 || p.x > canvas.width + 180) {
        respawn(p);
      }
    }

    function updateProjectiles() {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const pr = projectiles[i];
        const target = pr.owner === human ? cpu : human;

        pr.x += pr.vx;
        pr.y += pr.vy;
        pr.life--;

        addParticles(pr.x, pr.y, pr.color, 1, 2);

        const hit =
          pr.x + pr.size > target.x &&
          pr.x - pr.size < target.x + target.w &&
          pr.y + pr.size > target.y &&
          pr.y - pr.size < target.y + target.h;

        if (hit && target.invuln <= 0) {
          applyHit(pr.owner, target, pr.damage, pr.kb, pr.color, pr.ultimate);
          projectiles.splice(i, 1);
          continue;
        }

        if (pr.life <= 0 || pr.x < -100 || pr.x > canvas.width + 100) {
          projectiles.splice(i, 1);
        }
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.18;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function getAnimName(p) {
      if (p.stun > 0) return "hurt";
      if (p.attack === "quick") return "quick";
      if (p.attack === "heavy") return "heavy";
      if (p.attack === "special") return "special";
      if (p.attack === "ult") return "ult";
      if (!p.grounded) return "jump";
      if (Math.abs(p.vx) > 1.2) return "run";
      return "idle";
    }

    function drawFallbackFighter(p) {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);

      if (p.shielding) {
        ctx.strokeStyle = "#9fd7ff";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 52, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
      }

      ctx.fillStyle = p.accent + "33";
      ctx.beginPath();
      ctx.arc(0, 8, 28, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#4f3d2c";
      ctx.fillRect(-14, 25, 10, 22);
      ctx.fillRect(4, 25, 10, 22);

      ctx.fillStyle = p.color;
      ctx.fillRect(-22, -2, 44, 36);

      ctx.fillStyle = "#f1c58d";
      ctx.fillRect(-26, 5, 8, 20);
      ctx.fillRect(18, 5, 8, 20);

      ctx.fillStyle = "#f2c78d";
      ctx.beginPath();
      ctx.arc(0, -22, 20, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = p.accent;
      ctx.fillRect(-18, -44, 36, 8);
      ctx.beginPath();
      ctx.moveTo(-15, -44);
      ctx.lineTo(-8, -58);
      ctx.lineTo(-1, -44);
      ctx.lineTo(6, -58);
      ctx.lineTo(14, -44);
      ctx.fill();

      ctx.restore();
    }

    function drawSpriteFighter(p) {
      const anim = getAnimName(p);
      const bank = assetBank.fighters[p.name][anim];
      const speed = anim === "run" ? 8 : anim === "idle" ? 18 : 10;

      p.animTimer++;
      if (p.animTimer >= speed) {
        p.animTimer = 0;
        p.animFrame++;
      }

      const frameImg = bank[p.animFrame % bank.length];
      const valid = frameImg && frameImg.complete && frameImg.naturalWidth > 0 && frameImg.dataset.failed !== "true";

      if (!valid) {
        drawFallbackFighter(p);
        return;
      }

      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);

      if (p.facing === -1) ctx.scale(-1, 1);

      if (p.invuln > 0 && frame % 6 < 3) ctx.globalAlpha = 0.6;

      ctx.drawImage(frameImg, -60, -70, 120, 140);

      if (p.shielding) {
        ctx.strokeStyle = "#9fd7ff";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 54, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
      }

      ctx.restore();
    }

    function drawProjectile(pr) {
      ctx.save();
      ctx.shadowColor = pr.color;
      ctx.shadowBlur = 18;
      ctx.fillStyle = pr.color;

      if (pr.type === "arrow") {
        ctx.fillRect(pr.x - 12, pr.y - 2, 24, 4);
        ctx.beginPath();
        ctx.moveTo(pr.x + Math.sign(pr.vx) * 14, pr.y);
        ctx.lineTo(pr.x + Math.sign(pr.vx) * 4, pr.y - 6);
        ctx.lineTo(pr.x + Math.sign(pr.vx) * 4, pr.y + 6);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(pr.x, pr.y, pr.size, 0, Math.PI * 2);
        ctx.fill();
      }

      if (pr.ultimate) {
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.arc(pr.x, pr.y, pr.size + 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(p.life / 35, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawDetailedBackground() {
      const st = currentStage();

      const bg = assetBank.backgrounds[st.name];
      const valid = bg && bg.complete && bg.naturalWidth > 0 && bg.dataset.failed !== "true";

      if (valid) {
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
      } else {
        const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        g.addColorStop(0, st.sky1);
        g.addColorStop(0.56, st.sky2);
        g.addColorStop(0.57, st.ground1);
        g.addColorStop(1, st.ground2);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const sun = ctx.createRadialGradient(640, 90, 30, 640, 90, 260);
        sun.addColorStop(0, "rgba(255,255,255,0.55)");
        sun.addColorStop(0.3, "rgba(255,255,255,0.18)");
        sun.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = sun;
        ctx.beginPath();
        ctx.arc(640, 90, 260, 0, Math.PI * 2);
        ctx.fill();

        // mountains
        const mtns = [
          [50, 530, 330, 360, "rgba(70,100,130,.28)"],
          [260, 530, 420, 330, "rgba(55,90,125,.32)"],
          [700, 530, 340, 365, "rgba(65,95,120,.29)"]
        ];
        mtns.forEach(m => {
          ctx.fillStyle = m[4];
          ctx.beginPath();
          ctx.moveTo(m[0], m[1]);
          ctx.lineTo(m[0] + m[2] * 0.38, m[3]);
          ctx.lineTo(m[0] + m[2] * 0.68, m[3] + 55);
          ctx.lineTo(m[0] + m[2], m[1]);
          ctx.closePath();
          ctx.fill();
        });
      }

      // temple / stage
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      for (let x = arena.x + 60; x < arena.x + arena.w; x += 120) {
        ctx.fillStyle = "#ede1bd";
        ctx.fillRect(x, arena.y + 24, 26, 132);
        ctx.fillStyle = "#cfbf92";
        ctx.fillRect(x - 8, arena.y + 18, 42, 10);
        ctx.fillRect(x - 8, arena.y + 146, 42, 8);
      }

      drawPlatform(arena, true);
      arenaPlatforms.forEach(p => drawPlatform(p, false));
    }

    function drawPlatform(pl, main) {
      const st = currentStage();
      const grad = ctx.createLinearGradient(pl.x, pl.y, pl.x, pl.y + pl.h);
      grad.addColorStop(0, "#fff0bd");
      grad.addColorStop(0.5, st.platform);
      grad.addColorStop(1, "#78552a");
      ctx.fillStyle = grad;
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);

      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(pl.x, pl.y, pl.w, 4);

      if (main) {
        ctx.strokeStyle = st.accent;
        ctx.lineWidth = 2;
        ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
        ctx.lineWidth = 1;
      }
    }

    function drawPlayer(p) {
      drawSpriteFighter(p);

      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(p.x - 18, p.y - 32, p.w + 36, 22);
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "12px Arial";
      ctx.fillText(p.name + (p.isCPU ? " CPU" : " YOU"), p.x + p.w / 2, p.y - 16);
    }

    function drawBar(x, y, w, h, value, max, color, label) {
      ctx.fillStyle = "rgba(255,255,255,0.14)";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w * Math.max(0, Math.min(value / max, 1)), h);
      ctx.fillStyle = "white";
      ctx.font = "11px Arial";
      ctx.textAlign = "left";
      ctx.fillText(label, x, y - 4);
    }

    function drawHUDCard(p, x, y) {
      ctx.fillStyle = "rgba(0,0,0,0.44)";
      ctx.fillRect(x, y, 300, 120);
      ctx.strokeStyle = p.accent;
      ctx.strokeRect(x, y, 300, 120);

      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText(p.name + (p.isCPU ? " CPU" : " YOU"), x + 12, y + 24);

      ctx.fillStyle = p.damage < 60 ? "#fff7a8" : p.damage < 120 ? "#ffbf75" : "#ff7070";
      ctx.font = "16px Arial";
      ctx.fillText("Damage: " + Math.floor(p.damage) + "%", x + 12, y + 48);

      ctx.fillStyle = "white";
      ctx.fillText("Lives: " + p.lives, x + 180, y + 48);

      drawBar(x + 12, y + 66, 120, 8, 18 - p.cooldowns.light, 18, "#9cf39c", "Quick");
      drawBar(x + 160, y + 66, 120, 8, 34 - p.cooldowns.heavy, 34, "#ffc774", "Heavy");
      drawBar(x + 12, y + 88, 120, 8, 48 - p.cooldowns.special, 48, "#96d9ff", "Special");
      drawBar(x + 160, y + 88, 120, 8, p.ultMeter, 100, "#fff15b", "Ultimate");
      drawBar(x + 12, y + 108, 268, 8, p.shield, 100, "#9fd7ff", "Shield");
    }

    function drawHUD() {
      drawHUDCard(human, 18, 18);
      drawHUDCard(cpu, canvas.width - 318, 18);
    }

    function drawTitle() {
      drawDetailedBackground();
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f0d48a";
      ctx.textAlign = "center";
      ctx.font = "70px Arial";
      ctx.fillText("OLYMPUS BRAWLER HD", canvas.width / 2, 180);

      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText("Sprite-based Greek gods fighting game", canvas.width / 2, 250);
      ctx.fillText("Press ENTER to start", canvas.width / 2, 340);

      if (pressed["enter"]) state = STATES.FIGHTER_SELECT;
    }

    function drawFighterSelect() {
      drawDetailedBackground();
      ctx.fillStyle = "rgba(0,0,0,0.58)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f0d48a";
      ctx.textAlign = "center";
      ctx.font = "46px Arial";
      ctx.fillText("Choose Your Fighter", canvas.width / 2, 80);

      fighters.forEach((f, i) => {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const x = 100 + col * 350;
        const y = 120 + row * 160;
        const selected = i === selectedFighter;

        ctx.fillStyle = selected ? "rgba(255,240,180,0.22)" : "rgba(255,255,255,0.10)";
        ctx.fillRect(x, y, 280, 130);

        ctx.strokeStyle = selected ? "#ffffff" : f.accent;
        ctx.lineWidth = selected ? 5 : 3;
        ctx.strokeRect(x, y, 280, 130);
        ctx.lineWidth = 1;

        ctx.fillStyle = "white";
        ctx.textAlign = "left";
        ctx.font = "24px Arial";
        ctx.fillText((i + 1) + ". " + f.name, x + 14, y + 32);

        ctx.font = "13px Arial";
        ctx.fillStyle = "#f4dda0";
        ctx.fillText(f.projectile + " fighter", x + 14, y + 54);

        ctx.fillStyle = "#ddd";
        ctx.fillText("Quick " + f.light, x + 14, y + 78);
        ctx.fillText("Heavy " + f.heavy, x + 100, y + 78);
        ctx.fillText("Ult " + f.ult, x + 190, y + 78);

        drawBar(x + 14, y + 98, 80, 8, f.speed * 100, 100, "#9cf39c", "Speed");
        drawBar(x + 110, y + 98, 80, 8, (f.heavy / 25) * 100, 100, "#ffcb7b", "Power");
        drawBar(x + 206, y + 98, 60, 8, (f.jump / 16.2) * 100, 100, "#97d5ff", "Jump");
      });

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "18px Arial";
      ctx.fillText("Press 1-9 to choose, then ENTER", canvas.width / 2, 650);

      for (let i = 1; i <= 9; i++) {
        if (pressed[String(i)]) selectedFighter = i - 1;
      }
      if (pressed["enter"]) state = STATES.STAGE_SELECT;
    }

    function drawStageSelect() {
      drawDetailedBackground();
      ctx.fillStyle = "rgba(0,0,0,0.58)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f0d48a";
      ctx.textAlign = "center";
      ctx.font = "46px Arial";
      ctx.fillText("Choose Stage", canvas.width / 2, 90);

      stages.forEach((s, i) => {
        const x = 120 + i * 340;
        const y = 200;
        const selected = i === selectedStage;

        ctx.fillStyle = selected ? "rgba(255,240,180,0.22)" : "rgba(255,255,255,0.10)";
        ctx.fillRect(x, y, 280, 220);
        ctx.strokeStyle = selected ? "#ffffff" : s.accent;
        ctx.lineWidth = selected ? 5 : 3;
        ctx.strokeRect(x, y, 280, 220);
        ctx.lineWidth = 1;

        const bg = assetBank.backgrounds[s.name];
        const valid = bg && bg.complete && bg.naturalWidth > 0 && bg.dataset.failed !== "true";

        if (valid) {
          ctx.drawImage(bg, x + 18, y + 18, 244, 120);
        } else {
          const grad = ctx.createLinearGradient(x, y, x, y + 120);
          grad.addColorStop(0, s.sky1);
          grad.addColorStop(0.6, s.sky2);
          grad.addColorStop(0.61, s.ground1);
          grad.addColorStop(1, s.ground2);
          ctx.fillStyle = grad;
          ctx.fillRect(x + 18, y + 18, 244, 120);
        }

        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.fillText((i + 1) + ". " + s.name, x + 140, y + 168);

        ctx.font = "14px Arial";
        ctx.fillStyle = "#ddd";
        ctx.fillText("Detailed background supported", x + 140, y + 198);
      });

      ctx.fillStyle = "white";
      ctx.font = "18px Arial";
      ctx.fillText("Press 1-3 to choose, then ENTER", canvas.width / 2, 500);

      for (let i = 1; i <= 3; i++) {
        if (pressed[String(i)]) selectedStage = i - 1;
      }

      if (pressed["enter"]) startMatch();
    }

    function drawPauseOverlay() {
      ctx.fillStyle = "rgba(0,0,0,0.62)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f0d48a";
      ctx.textAlign = "center";
      ctx.font = "54px Arial";
      ctx.fillText("PAUSED", canvas.width / 2, 320);
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText("Press P to resume", canvas.width / 2, 360);
    }

    function drawGameOver() {
      drawDetailedBackground();
      drawPlayer(human);
      drawPlayer(cpu);
      drawHUD();

      ctx.fillStyle = "rgba(0,0,0,0.68)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f0d48a";
      ctx.textAlign = "center";
      ctx.font = "56px Arial";
      ctx.fillText(winner + " wins!", canvas.width / 2, 290);

      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Press ENTER for fighter select", canvas.width / 2, 350);
      ctx.fillText("Press R for rematch", canvas.width / 2, 385);

      if (pressed["enter"]) state = STATES.FIGHTER_SELECT;
      if (pressed["r"]) startMatch();
    }

    function updateGame() {
      if (pressed["p"]) {
        state = state === STATES.PAUSED ? STATES.PLAYING : STATES.PAUSED;
      }

      if (state === STATES.PAUSED) return;

      updatePlayer(human, cpu);
      updatePlayer(cpu, human);
      updateProjectiles();
      updateParticles();
    }

    function drawGame() {
      drawDetailedBackground();

      projectiles.forEach(drawProjectile);
      drawParticles();
      drawPlayer(human);
      drawPlayer(cpu);
      drawHUD();

      if (state === STATES.PAUSED) drawPauseOverlay();
    }

    function clearPressed() {
      Object.keys(pressed).forEach(k => delete pressed[k]);
    }

    function gameLoop() {
      frame++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      const sx = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      const sy = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      ctx.translate(sx, sy);

      if (state === STATES.TITLE) drawTitle();
      else if (state === STATES.FIGHTER_SELECT) drawFighterSelect();
      else if (state === STATES.STAGE_SELECT) drawStageSelect();
      else if (state === STATES.PLAYING || state === STATES.PAUSED) {
        updateGame();
        drawGame();
      }
      else if (state === STATES.GAME_OVER) drawGameOver();

      ctx.restore();

      if (shake > 0) shake *= 0.84;
      if (shake < 0.3) shake = 0;

      clearPressed();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
